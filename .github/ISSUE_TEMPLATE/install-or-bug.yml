name: Install or bug report
description: Report an install problem, validation issue, or behavior bug.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Please remove private values before posting. Do not include credentials, tokens, client data, raw prompts, logs with secrets, screenshots with private UI, or local machine paths.
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS, Ubuntu
    validations:
      required: true
  - type: input
    id: tool
    attributes:
      label: Tool
      description: Which AI coding tool or local setup are you using?
      placeholder: Codex, Claude Code, or other local skill setup
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Skill name
      placeholder: github-safe-publisher
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the public-safe steps that produced the problem.
      placeholder: 1. Ran install command... 2. Reloaded tool... 3. Skill did not appear...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The skill appears after reload.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The skill did not appear, or validation failed.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or output
      description: Optional. Remove private values, usernames, local paths, credentials, tokens, client details, and account data.
      render: shell
    validations:
      required: false
